let map, markers = [], currentMuseum = null;

function initMap() {
    map = new AMap.Map('map', { zoom: 5, center: [110, 35], viewMode: '2D' });
    map.addControl(new AMap.Scale());
    map.addControl(new AMap.ToolBar({ position: 'RB' }));
    renderData(museumsData);
}

function renderData(data) {
    document.getElementById('loading').classList.add('hidden');
    const provinces = new Set(data.map(m => m.province));
    document.getElementById('province-count').textContent = provinces.size;
    document.getElementById('total-count').textContent = data.length;

    const listEl = document.getElementById('museum-list');
    listEl.innerHTML = '';

    data.forEach((museum, index) => {
        const item = document.createElement('div');
        item.className = 'museum-item';
        item.dataset.index = index;
        item.innerHTML = `
            <div class="museum-name">${museum.name}</div>
            <span class="museum-province">${museum.province}</span>
            <div class="museum-address">📍 ${museum.address}</div>
        `;
        item.addEventListener('click', () => selectMuseum(museum, item, index));
        listEl.appendChild(item);
        addMarker(museum, index);
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase();
        let visibleCount = 0;
        document.querySelectorAll('.museum-item').forEach((item, idx) => {
            const museum = data[idx];
            const match = museum.name.toLowerCase().includes(keyword) ||
                          museum.address.toLowerCase().includes(keyword) ||
                          museum.province.toLowerCase().includes(keyword);
            item.style.display = match ? 'block' : 'none';
            if(match) visibleCount++;
        });
        if(visibleCount === 0 && keyword) {
            listEl.innerHTML = '<div class="no-result">未找到匹配的美术馆</div>';
        }
    });

    if (markers.length > 0) map.setFitView(markers, false, [60,60,60,380]);
}

function addMarker(museum, index) {
    const marker = new AMap.Marker({
        position: [museum.longitude, museum.latitude],
        title: museum.name,
        label: { content: `<div style="background:#667eea;color:white;padding:2px 6px;border-radius:3px;font-size:11px;white-space:nowrap;">${museum.name}</div>`, offset: new AMap.Pixel(0, -30), direction: 'top' }
    });

    const infoWindow = new AMap.InfoWindow({
        content: `<div class="info-window"><h3>${museum.name}</h3><p class="address">📍 ${museum.address}</p><p>${museum.overview || '暂无简介'}</p></div>`,
        offset: new AMap.Pixel(0, -30)
    });

    marker.on('click', () => {
        infoWindow.open(map, marker.getPosition());
        const item = document.querySelector(`[data-index="${index}"]`);
        if(item) selectMuseum(museum, item, index);
    });

    marker.addTo(map);
    markers.push(marker);
}

function selectMuseum(museum, itemElement, index) {
    document.querySelectorAll('.museum-item').forEach(el => el.classList.remove('active'));
    itemElement.classList.add('active');
    itemElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    map.setCenter([museum.longitude, museum.latitude]);
    map.setZoom(15);
    markers[index].emit('click');
    currentMuseum = museum;
}

window.onload = initMap;
