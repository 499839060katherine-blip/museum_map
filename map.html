<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国乡村美术馆地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 380px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        #header p {
            font-size: 13px;
            opacity: 0.9;
        }

        #stats {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 12px;
        }

        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
        }

        #search-box {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        #search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #search-input:focus {
            border-color: #667eea;
        }

        #museum-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .museum-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .museum-item:hover {
            background: #e9ecef;
            transform: translateX(3px);
        }

        .museum-item.active {
            background: #e7e9ff;
            border-left-color: #667eea;
        }

        .museum-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .museum-province {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .museum-address {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .info-window {
            padding: 10px;
            max-width: 300px;
        }

        .info-window h3 {
            margin-bottom: 8px;
            color: #333;
            font-size: 16px;
        }

        .info-window p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 5px;
        }

        .info-window .address {
            color: #667eea;
            font-weight: 500;
        }

        /* 加载提示 */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>正在加载地图数据...</p>
    </div>

    <div id="container">
        <div id="sidebar">
            <div id="header">
                <h1>🏛️ 中国乡村美术馆</h1>
                <p>探索乡村中的艺术之美</p>
                <div id="stats">
                    <span class="stat-item">📍 <span id="total-count">0</span> 个馆</span>
                    <span class="stat-item">🏘️ <span id="province-count">0</span> 个省份</span>
                </div>
            </div>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="搜索美术馆名称或地址...">
            </div>
            <div id="museum-list"></div>
        </div>
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- 高德地图 API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_API_KEY_HERE"></script>

    <script>
        // 示例数据 - 实际使用时替换为完整数据
        const museumsData = [
            {
                "name": "白云美术馆",
                "province": "浙江",
                "address": "浙江湖州市德清县莫干山庾村",
                "longitude": 119.78,
                "latitude": 30.63,
                "overview": "发掘新锐艺术家、实现艺术的日常生活化..."
            },
            {
                "name": "杜吞美术馆",
                "province": "浙江",
                "address": "浙江省宁波章水镇杜岙村",
                "longitude": 121.45,
                "latitude": 29.82,
                "overview": "公益初衷，为了把文化艺术送到乡村..."
            },
            {
                "name": "木心美术馆",
                "province": "浙江",
                "address": "浙江省嘉兴市乌镇西栅景区",
                "longitude": 120.48,
                "latitude": 30.74,
                "overview": "致力于纪念和展示画家、作家木心先生..."
            },
            {
                "name": "龙门美术馆",
                "province": "浙江",
                "address": "浙江省杭州市富阳市龙门古镇",
                "longitude": 119.95,
                "latitude": 29.95,
                "overview": "挖掘古镇文化资源，以古建筑为载体..."
            },
            {
                "name": "泥美术馆",
                "province": "浙江",
                "address": "浙江省龙游县溪口村",
                "longitude": 119.17,
                "latitude": 29.03,
                "overview": "位于溪口未来乡村，原是一座废弃的水电站..."
            }
        ];

        let map;
        let markers = [];
        let currentMuseum = null;

        function initMap() {
            // 创建地图
            map = new AMap.Map('map', {
                zoom: 6,
                center: [120.5, 30.0],
                viewMode: '2D'
            });

            // 添加地图控件
            map.addControl(new AMap.Scale());
            map.addControl(new AMap.ToolBar({
                position: 'RB'
            }));

            // 加载数据
            loadData();
        }

        function loadData() {
            // 尝试从JSON文件加载数据
            fetch('museums_data.json')
                .then(response => response.json())
                .then(data => {
                    renderData(data);
                })
                .catch(err => {
                    console.log('使用示例数据', err);
                    renderData(museumsData);
                });
        }

        function renderData(data) {
            document.getElementById('loading').classList.add('hidden');

            // 更新统计
            document.getElementById('total-count').textContent = data.length;
            const provinces = new Set(data.map(m => m.province));
            document.getElementById('province-count').textContent = provinces.size;

            // 渲染列表
            const listEl = document.getElementById('museum-list');
            listEl.innerHTML = '';

            data.forEach((museum, index) => {
                const item = document.createElement('div');
                item.className = 'museum-item';
                item.dataset.index = index;
                item.innerHTML = `
                    <div class="museum-name">${museum.name}</div>
                    <span class="museum-province">${museum.province}</span>
                    <div class="museum-address">📍 ${museum.address}</div>
                `;
                item.addEventListener('click', () => selectMuseum(museum, item));
                listEl.appendChild(item);

                // 添加地图标记
                addMarker(museum);
            });

            // 搜索功能
            document.getElementById('search-input').addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                document.querySelectorAll('.museum-item').forEach((item, idx) => {
                    const museum = data[idx];
                    const match = museum.name.toLowerCase().includes(keyword) ||
                                  museum.address.toLowerCase().includes(keyword) ||
                                  museum.province.toLowerCase().includes(keyword);
                    item.style.display = match ? 'block' : 'none';
                });
            });

            // 自适应地图视角
            if (markers.length > 0) {
                map.setFitView(markers);
            }
        }

        function addMarker(museum) {
            const marker = new AMap.Marker({
                position: [museum.longitude, museum.latitude],
                title: museum.name,
                label: {
                    content: `<div style="background:#667eea;color:white;padding:2px 6px;border-radius:3px;font-size:12px;">${museum.name}</div>`,
                    offset: new AMap.Pixel(0, -30),
                    direction: 'top'
                }
            });

            // 信息窗体
            const infoWindow = new AMap.InfoWindow({
                content: `
                    <div class="info-window">
                        <h3>${museum.name}</h3>
                        <p class="address">📍 ${museum.address}</p>
                        <p>${museum.overview || '暂无简介'}</p>
                    </div>
                `,
                offset: new AMap.Pixel(0, -30)
            });

            marker.on('click', () => {
                infoWindow.open(map, marker.getPosition());
            });

            marker.on('mouseover', () => {
                marker.setLabel({
                    content: `<div style="background:#764ba2;color:white;padding:4px 8px;border-radius:4px;font-size:13px;font-weight:bold;">${museum.name}</div>`,
                    offset: new AMap.Pixel(0, -35),
                    direction: 'top'
                });
            });

            marker.on('mouseout', () => {
                marker.setLabel({
                    content: `<div style="background:#667eea;color:white;padding:2px 6px;border-radius:3px;font-size:12px;">${museum.name}</div>`,
                    offset: new AMap.Pixel(0, -30),
                    direction: 'top'
                });
            });

            marker.addTo(map);
            markers.push(marker);
        }

        function selectMuseum(museum, itemElement) {
            // 高亮列表项
            document.querySelectorAll('.museum-item').forEach(el => el.classList.remove('active'));
            itemElement.classList.add('active');

            // 地图定位
            map.setCenter([museum.longitude, museum.latitude]);
            map.setZoom(14);

            // 打开信息窗体
            const marker = markers.find(m => {
                const pos = m.getPosition();
                return pos.lng === museum.longitude && pos.lat === museum.latitude;
            });
            if (marker) {
                marker.emit('click');
            }

            currentMuseum = museum;
        }

        // 初始化
        window.onload = initMap;
    </script>
</body>
</html>
